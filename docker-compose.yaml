version: "3.9"

services:
  postgres-db:
    image: postgres:14
    container_name: postgres
    env_file:
      - postgres_db.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    env_file:
      - backend.env
    depends_on:
      - postgres-db
    ports:
      - "8000:8000"
    networks:
      - app-network
    volumes:
      - .:/app

networks:
  app-network:

volumes:
  pgdata:
