apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cpu-alert
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: example
    rules:
    - alert: HighCPUUsage
      expr: rate(container_cpu_usage_seconds_total[1m]) > 0.8
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage detected"
